name: "Copilot Setup Steps"

# Run the setup steps when they change so we can validate them, and allow
# manual dispatch from the Actions tab.
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  # The job MUST be called `copilot-setup-steps` or Copilot will not pick it up.
  copilot-setup-steps:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      # Tauri's webview shell (`app/src-tauri`) links against GTK/WebKit/glib
      # via system pkg-config. Without these `-dev` packages, any workspace
      # build (including `cargo clippy --all`) fails before it can run, and
      # agents are forced to fall back to the `-p github-graphql` subset. See
      # `.github/copilot-instructions.md` for the validation suite this
      # enables.
      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libdbus-1-dev \
            libglib2.0-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            build-essential \
            pkg-config
