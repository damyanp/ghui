name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "New version number (e.g. 0.3.0)"
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
      with:
        # Need a PAT to push back to main (bypasses rulesets)
        token: ${{ secrets.RELEASE_PAT }}

    - name: Bump version numbers
      shell: pwsh
      run: |
        $v = "${{ inputs.version }}"

        # tauri.conf.json
        $conf = Get-Content app/src-tauri/tauri.conf.json -Raw | ConvertFrom-Json
        $conf.version = $v
        $conf | ConvertTo-Json -Depth 10 | Set-Content app/src-tauri/tauri.conf.json

        # Cargo.toml files
        foreach ($toml in @(
          "app/src-tauri/Cargo.toml",
          "ghui-app/Cargo.toml",
          "github-graphql/Cargo.toml",
          "ghui-util/Cargo.toml"
        )) {
          (Get-Content $toml) -replace '^version = ".*"', "version = `"$v`"" | Set-Content $toml
        }

        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add app/src-tauri/tauri.conf.json app/src-tauri/Cargo.toml ghui-app/Cargo.toml github-graphql/Cargo.toml ghui-util/Cargo.toml

        git diff --cached --quiet
        if ($LASTEXITCODE -eq 0) {
          Write-Host "No version changes to commit; skipping git commit and push."
        }
        else {
          git commit -m "Bump version to $v"
          git push origin HEAD:"${{ github.ref_name }}"
        }

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 'lts/*'

    - name: Install frontend dependencies
      working-directory: app
      run: npm ci

    - name: Build Tauri app
      working-directory: app
      run: npx tauri build

    - name: Publish GitHub Release
      shell: pwsh
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        $tag = "v${{ inputs.version }}"
        $nsis = Get-ChildItem target/release/bundle/nsis/*-setup.exe | Select-Object -First 1
        if ($null -eq $nsis) {
          Write-Error "No NSIS installer found in target/release/bundle/nsis/"
          exit 1
        }
        gh release create $tag --title "ghui $tag" $nsis.FullName
