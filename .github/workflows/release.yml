name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type (ignored if 'version' override is provided)"
        required: true
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major
      version:
        description: "Optional explicit version (e.g. 0.3.0). Overrides 'bump' when set."
        required: false
        type: string
        default: ""

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
      with:
        # Need a PAT to push back to main (bypasses rulesets)
        token: ${{ secrets.RELEASE_PAT }}

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Compute new version
      id: version
      shell: pwsh
      run: |
        $override = "${{ inputs.version }}".Trim()
        $bump = "${{ inputs.bump }}"

        $conf = Get-Content app/src-tauri/tauri.conf.json -Raw | ConvertFrom-Json
        $current = [string]$conf.version
        if ($current -notmatch '^\d+\.\d+\.\d+$') {
          Write-Error "Current version '$current' in tauri.conf.json does not match X.Y.Z"
          exit 1
        }

        if ($override -ne "") {
          if ($override -notmatch '^\d+\.\d+\.\d+$') {
            Write-Error "Override version '$override' does not match X.Y.Z"
            exit 1
          }
          $new = $override
        }
        else {
          $parts = $current.Split('.') | ForEach-Object { [int]$_ }
          switch ($bump) {
            'patch' { $parts[2] += 1 }
            'minor' { $parts[1] += 1; $parts[2] = 0 }
            'major' { $parts[0] += 1; $parts[1] = 0; $parts[2] = 0 }
            default {
              Write-Error "Unknown bump type '$bump'"
              exit 1
            }
          }
          $new = "$($parts[0]).$($parts[1]).$($parts[2])"
        }

        Write-Host "Current version: $current"
        Write-Host "New version:     $new"
        "new_version=$new" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
        "## Release version`n`n- Previous: ``$current```n- New:      ``$new```n" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8

    - name: Bump version numbers
      shell: pwsh
      run: |
        $v = "${{ steps.version.outputs.new_version }}"

        # tauri.conf.json
        $conf = Get-Content app/src-tauri/tauri.conf.json -Raw | ConvertFrom-Json
        $conf.version = $v
        $conf | ConvertTo-Json -Depth 10 | Set-Content app/src-tauri/tauri.conf.json

        # Cargo.toml files
        foreach ($toml in @(
          "app/src-tauri/Cargo.toml",
          "ghui-app/Cargo.toml",
          "github-graphql/Cargo.toml",
          "ghui-util/Cargo.toml"
        )) {
          (Get-Content $toml) -replace '^version = ".*"', "version = `"$v`"" | Set-Content $toml
        }

        # Refresh Cargo.lock so workspace crate entries match the bumped manifests.
        # See copilot-instructions.md: "Workspace version bumps and Cargo.lock".
        cargo update --workspace
        if ($LASTEXITCODE -ne 0) {
          Write-Error "cargo update --workspace failed"
          exit 1
        }

        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add app/src-tauri/tauri.conf.json app/src-tauri/Cargo.toml ghui-app/Cargo.toml github-graphql/Cargo.toml ghui-util/Cargo.toml Cargo.lock

        git diff --cached --quiet
        if ($LASTEXITCODE -eq 0) {
          Write-Host "No version changes to commit; skipping git commit and push."
        }
        else {
          git commit -m "Bump version to $v"
          git push origin HEAD:"${{ github.ref_name }}"
        }

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 'lts/*'

    - name: Install frontend dependencies
      working-directory: app
      run: npm ci

    - name: Build Tauri app
      working-directory: app
      run: npx tauri build

    - name: Publish GitHub Release
      shell: pwsh
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        $tag = "v${{ steps.version.outputs.new_version }}"
        $nsis = Get-ChildItem target/release/bundle/nsis/*-setup.exe | Select-Object -First 1
        if ($null -eq $nsis) {
          Write-Error "No NSIS installer found in target/release/bundle/nsis/"
          exit 1
        }
        gh release create $tag --title "ghui $tag" $nsis.FullName
