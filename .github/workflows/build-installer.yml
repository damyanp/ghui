name: Build Windows Installer

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-installer:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 'lts/*'

    - name: Install frontend dependencies
      working-directory: app
      run: npm ci

    - name: Build Tauri app
      working-directory: app
      run: npx tauri build

    - name: Publish GitHub Release
      shell: pwsh
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        $version = (Get-Content app/src-tauri/tauri.conf.json | ConvertFrom-Json).version
        $tag = "v$version"
        $nsis = Get-ChildItem target/release/bundle/nsis/*.exe | Select-Object -First 1
        if ($null -eq $nsis) {
          Write-Error "No NSIS installer found in target/release/bundle/nsis/"
          exit 1
        }
        gh release create $tag --title "ghui $tag" $nsis.FullName
