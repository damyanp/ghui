name: Build Windows Installer

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build-installer:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 'lts/*'

    - name: Install frontend dependencies
      working-directory: app
      run: npm ci

    - name: Import code signing certificate
      env:
        CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
        CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
      run: |
        if (-not $env:CERTIFICATE_BASE64) {
          Write-Host "No signing certificate configured, skipping import"
          exit 0
        }
        $pfxBytes = [Convert]::FromBase64String($env:CERTIFICATE_BASE64)
        $pfxPath = Join-Path $env:RUNNER_TEMP "certificate.pfx"
        [IO.File]::WriteAllBytes($pfxPath, $pfxBytes)
        $password = ConvertTo-SecureString -String $env:CERTIFICATE_PASSWORD -AsPlainText -Force
        $cert = Import-PfxCertificate -FilePath $pfxPath -CertStoreLocation Cert:\CurrentUser\My -Password $password
        echo "CERTIFICATE_THUMBPRINT=$($cert.Thumbprint)" >> $env:GITHUB_ENV
        Remove-Item $pfxPath
      shell: pwsh

    - name: Build Tauri app (signed)
      if: env.CERTIFICATE_THUMBPRINT
      working-directory: app
      run: >-
        npx tauri build
        --config
        '{"bundle":{"windows":{"certificateThumbprint":"${{ env.CERTIFICATE_THUMBPRINT }}","digestAlgorithm":"sha256","timestampUrl":"https://timestamp.digicert.com"}}}'

    - name: Build Tauri app (unsigned)
      if: ${{ !env.CERTIFICATE_THUMBPRINT }}
      working-directory: app
      run: npx tauri build

    - name: Upload installer artifacts
      uses: actions/upload-artifact@v4
      with:
        name: windows-installer
        path: |
          target/release/bundle/msi/*.msi
          target/release/bundle/nsis/*.exe
