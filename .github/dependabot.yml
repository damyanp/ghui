# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  - package-ecosystem: "cargo" # See documentation for possible values
    directory: "/" # Location of package manifests
    schedule:
      interval: "weekly"
    # Batch all cargo updates into a single PR to avoid PR sprawl.
    groups:
      cargo:
        patterns:
          - "*"
 # Enable version updates for npm
  - package-ecosystem: "npm"
    # Look for `package.json` and `lock` files in the `app` directory
    directory: "/app"
    schedule:
      interval: "weekly"
    # Batch all npm updates into a single PR to avoid PR sprawl.
    groups:
      npm:
        patterns:
          - "*"
  # Keep GitHub Actions used in workflows up to date, also batched.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns:
          - "*"
