<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Variant D: Asymmetric tree in window - more organic, realistic hierarchy feel -->

  <!-- Soft shadow -->
  <rect x="60" y="64" width="400" height="400" rx="40" ry="40" fill="#000" opacity="0.15"/>

  <!-- Window background -->
  <rect x="56" y="56" width="400" height="400" rx="40" ry="40" fill="#1C1C30"/>

  <!-- Title bar background -->
  <rect x="56" y="56" width="400" height="52" rx="40" ry="40" fill="#252540"/>
  <rect x="56" y="88" width="400" height="20" fill="#252540"/>

  <!-- Title bar dots -->
  <circle cx="100" cy="82" r="8" fill="#F5B731"/>
  <circle cx="126" cy="82" r="8" fill="#3CC8DB"/>

  <!-- Accent line -->
  <line x1="56" y1="108" x2="456" y2="108" stroke="#3CC8DB" stroke-width="2" opacity="0.4"/>

  <!-- Asymmetric tree - more like a real project hierarchy -->
  <!-- Root -->
  <circle cx="180" cy="164" r="22" fill="#F5B731"/>

  <!-- Root to children -->
  <line x1="180" y1="186" x2="120" y2="244" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.3"/>
  <line x1="180" y1="186" x2="260" y2="244" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.3"/>
  <line x1="180" y1="186" x2="370" y2="244" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.3"/>

  <!-- Level 2 nodes -->
  <circle cx="120" cy="256" r="18" fill="#3CC8DB"/>
  <circle cx="260" cy="256" r="18" fill="#3CC8DB"/>
  <circle cx="370" cy="256" r="18" fill="#F5B731" opacity="0.8"/>

  <!-- Level 2 to Level 3 connections -->
  <line x1="120" y1="274" x2="96" y2="334" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.25"/>
  <line x1="120" y1="274" x2="152" y2="334" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.25"/>
  <line x1="260" y1="274" x2="224" y2="334" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.25"/>
  <line x1="260" y1="274" x2="296" y2="334" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.25"/>
  <line x1="260" y1="274" x2="340" y2="334" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.25"/>

  <!-- Level 3 -->
  <circle cx="96" cy="346" r="13" fill="#3CC8DB" opacity="0.6"/>
  <circle cx="152" cy="346" r="13" fill="#3CC8DB" opacity="0.6"/>
  <circle cx="224" cy="346" r="13" fill="#3CC8DB" opacity="0.6"/>
  <circle cx="296" cy="346" r="13" fill="#F5B731" opacity="0.6"/>
  <circle cx="340" cy="346" r="13" fill="#3CC8DB" opacity="0.6"/>

  <!-- Level 3 to Level 4 -->
  <line x1="224" y1="359" x2="208" y2="404" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.2"/>
  <line x1="224" y1="359" x2="248" y2="404" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.2"/>

  <!-- Level 4 -->
  <circle cx="208" cy="414" r="10" fill="#3CC8DB" opacity="0.45"/>
  <circle cx="248" cy="414" r="10" fill="#3CC8DB" opacity="0.45"/>
</svg>
