<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Variant G: Bold & simplified tree-table — fewer rows, thicker, reads well at small sizes -->

  <!-- Background -->
  <rect x="32" y="32" width="448" height="448" rx="64" ry="64" fill="#1C1C30"/>

  <!-- Window top accent bar -->
  <rect x="32" y="32" width="448" height="56" rx="64" ry="64" fill="#252542"/>
  <rect x="32" y="64" width="448" height="24" fill="#252542"/>
  <line x1="32" y1="88" x2="480" y2="88" stroke="#3CC8DB" stroke-width="3" opacity="0.4"/>

  <!-- Title bar dots -->
  <circle cx="80" cy="62" r="10" fill="#F5B731"/>
  <circle cx="108" cy="62" r="10" fill="#3CC8DB" opacity="0.5"/>

  <!-- === Simplified Tree Rows (Bold, readable at 32px) === -->

  <!-- Row 1: Root — expanded ▼, golden, THICK bars -->
  <polygon points="76,120 100,120 88,140" fill="#F5B731"/>
  <rect x="112" y="112" width="340" height="38" rx="10" fill="#F5B731" opacity="0.35"/>

  <!-- Row 2: Child — expanded ▼, indented, cyan -->
  <polygon points="120,186 144,186 132,206" fill="#3CC8DB"/>
  <rect x="156" y="178" width="296" height="38" rx="10" fill="#3CC8DB" opacity="0.25"/>

  <!-- Row 3: Grandchild, indented 2 levels — leaf dot -->
  <circle cx="180" cy="253" r="8" fill="#3CC8DB" opacity="0.6"/>
  <rect x="200" y="236" width="252" height="34" rx="8" fill="#3CC8DB" opacity="0.15"/>

  <!-- Row 4: Grandchild, indented 2 levels — leaf dot, golden accent -->
  <circle cx="180" cy="303" r="8" fill="#F5B731" opacity="0.6"/>
  <rect x="200" y="286" width="252" height="34" rx="8" fill="#F5B731" opacity="0.12"/>

  <!-- Row 5: Child — collapsed ▶, indented -->
  <polygon points="120,352 142,365 120,378" fill="#3CC8DB"/>
  <rect x="156" y="348" width="296" height="38" rx="10" fill="#3CC8DB" opacity="0.25"/>

  <!-- Row 6: Root — collapsed ▶ -->
  <polygon points="76,416 100,429 76,442" fill="#F5B731" opacity="0.6"/>
  <rect x="112" y="412" width="340" height="38" rx="10" fill="#F5B731" opacity="0.18"/>
</svg>
