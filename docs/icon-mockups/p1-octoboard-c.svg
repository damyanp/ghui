<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Proposal 1C: "The Octoboard" - Bold stylized G from graph nodes, clean and iconic -->

  <!-- Background circle for a more app-icon feel -->
  <circle cx="256" cy="256" r="240" fill="#1A1A2E"/>

  <!-- The "G" made of thick connected segments and prominent nodes -->
  <!-- G shape: arc from 1 o'clock position, around counter-clockwise to 3 o'clock, then inward bar -->

  <!-- Main arc of G -->
  <path d="M 340 120
           C 280 80, 160 90, 120 170
           C 80 250, 90 350, 160 400
           C 230 450, 340 430, 380 360"
        stroke="#3CC8DB" stroke-width="14" fill="none" stroke-linecap="round"/>

  <!-- Horizontal bar of G (the distinctive feature) -->
  <line x1="380" y1="360" x2="380" y2="260" stroke="#F5B731" stroke-width="14" stroke-linecap="round"/>
  <line x1="380" y1="260" x2="280" y2="260" stroke="#F5B731" stroke-width="14" stroke-linecap="round"/>

  <!-- Nodes at key points of the G -->
  <!-- Top of G -->
  <circle cx="340" cy="120" r="22" fill="#3CC8DB"/>
  <circle cx="340" cy="120" r="9" fill="#1A1A2E"/>

  <!-- Upper left curve -->
  <circle cx="120" cy="170" r="18" fill="#3CC8DB" opacity="0.85"/>

  <!-- Lower left curve -->
  <circle cx="120" cy="340" r="18" fill="#3CC8DB" opacity="0.85"/>

  <!-- Bottom of G -->
  <circle cx="160" cy="400" r="18" fill="#3CC8DB" opacity="0.85"/>

  <!-- Junction of arc and bar -->
  <circle cx="380" cy="360" r="18" fill="#3CC8DB"/>

  <!-- End of vertical bar -->
  <circle cx="380" cy="260" r="20" fill="#F5B731"/>

  <!-- End of horizontal bar (center of G, prominent) -->
  <circle cx="280" cy="260" r="26" fill="#F5B731"/>
  <circle cx="280" cy="260" r="12" fill="#1A1A2E"/>
</svg>
