<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Variant E: Tree-table in window chrome — indented rows with chevrons -->

  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2A2A3A"/>
      <stop offset="100%" stop-color="#1A1A2A"/>
    </linearGradient>
  </defs>

  <!-- App window frame -->
  <rect x="48" y="48" width="416" height="416" rx="44" ry="44"
        fill="url(#bgGrad)" stroke="#3CC8DB" stroke-width="12"/>

  <!-- Title bar dots -->
  <circle cx="104" cy="100" r="10" fill="#F5B731" opacity="0.9"/>
  <circle cx="134" cy="100" r="10" fill="#3CC8DB" opacity="0.6"/>
  <circle cx="164" cy="100" r="10" fill="#3CC8DB" opacity="0.3"/>

  <!-- Divider line under title bar -->
  <line x1="72" y1="128" x2="440" y2="128" stroke="#3CC8DB" stroke-width="2" opacity="0.3"/>

  <!-- === Tree Table Rows === -->
  <!-- Row 1: Root item — expanded (chevron down), golden accent -->
  <!-- Chevron down ▼ -->
  <polygon points="92,160 108,160 100,174" fill="#F5B731"/>
  <!-- Row bar -->
  <rect x="118" y="152" width="300" height="26" rx="6" fill="#F5B731" opacity="0.25"/>
  <rect x="118" y="152" width="120" height="26" rx="6" fill="#F5B731" opacity="0.5"/>

  <!-- Row 2: Child item — expanded (chevron down), indented 1 level -->
  <polygon points="122,206 138,206 130,220" fill="#3CC8DB" opacity="0.8"/>
  <rect x="148" y="198" width="270" height="26" rx="6" fill="#3CC8DB" opacity="0.2"/>
  <rect x="148" y="198" width="100" height="26" rx="6" fill="#3CC8DB" opacity="0.4"/>

  <!-- Row 3: Grandchild leaf — no chevron, indented 2 levels -->
  <rect x="178" y="244" width="240" height="26" rx="6" fill="#3CC8DB" opacity="0.15"/>
  <rect x="178" y="244" width="80" height="26" rx="6" fill="#3CC8DB" opacity="0.3"/>

  <!-- Row 4: Grandchild leaf — no chevron, indented 2 levels -->
  <rect x="178" y="282" width="240" height="26" rx="6" fill="#F5B731" opacity="0.12"/>
  <rect x="178" y="282" width="60" height="26" rx="6" fill="#F5B731" opacity="0.3"/>

  <!-- Row 5: Child item — collapsed (chevron right), indented 1 level -->
  <polygon points="122,328 136,335 122,342" fill="#3CC8DB" opacity="0.8"/>
  <rect x="148" y="322" width="270" height="26" rx="6" fill="#3CC8DB" opacity="0.2"/>
  <rect x="148" y="322" width="140" height="26" rx="6" fill="#3CC8DB" opacity="0.4"/>

  <!-- Row 6: Child leaf — no chevron, indented 1 level -->
  <rect x="148" y="364" width="270" height="26" rx="6" fill="#3CC8DB" opacity="0.15"/>
  <rect x="148" y="364" width="90" height="26" rx="6" fill="#3CC8DB" opacity="0.3"/>

  <!-- Row 7: Another root — collapsed (chevron right) -->
  <polygon points="84,410 98,417 84,424" fill="#F5B731" opacity="0.6"/>
  <rect x="118" y="404" width="300" height="26" rx="6" fill="#F5B731" opacity="0.12"/>
  <rect x="118" y="404" width="110" height="26" rx="6" fill="#F5B731" opacity="0.3"/>
</svg>
