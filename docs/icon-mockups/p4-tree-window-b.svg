<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Variant B: Filled window with outline tree, more minimal -->

  <!-- Background rounded square -->
  <rect x="48" y="48" width="416" height="416" rx="56" ry="56" fill="#1E1E2E"/>

  <!-- Window chrome: thin top bar -->
  <rect x="48" y="48" width="416" height="64" rx="56" ry="56" fill="#292940"/>
  <rect x="48" y="88" width="416" height="24" fill="#292940"/>

  <!-- Title bar accent stripe -->
  <rect x="48" y="108" width="416" height="4" fill="#3CC8DB" opacity="0.5"/>

  <!-- Tree structure - stroke style -->
  <!-- Vertical trunk -->
  <line x1="256" y1="160" x2="256" y2="220" stroke="#F5B731" stroke-width="8" stroke-linecap="round"/>

  <!-- Branch left -->
  <line x1="256" y1="220" x2="152" y2="280" stroke="#3CC8DB" stroke-width="6" stroke-linecap="round"/>
  <!-- Branch right -->
  <line x1="256" y1="220" x2="360" y2="280" stroke="#3CC8DB" stroke-width="6" stroke-linecap="round"/>

  <!-- Sub-branch left-left -->
  <line x1="152" y1="280" x2="108" y2="350" stroke="#3CC8DB" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
  <!-- Sub-branch left-right -->
  <line x1="152" y1="280" x2="196" y2="350" stroke="#3CC8DB" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
  <!-- Sub-branch right -->
  <line x1="360" y1="280" x2="320" y2="350" stroke="#3CC8DB" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
  <line x1="360" y1="280" x2="400" y2="350" stroke="#3CC8DB" stroke-width="4" stroke-linecap="round" opacity="0.8"/>

  <!-- Nodes -->
  <!-- Root -->
  <circle cx="256" cy="160" r="22" fill="#F5B731"/>
  <!-- Level 2 -->
  <circle cx="152" cy="280" r="18" fill="#3CC8DB"/>
  <circle cx="360" cy="280" r="18" fill="#3CC8DB"/>
  <!-- Level 3 -->
  <circle cx="108" cy="350" r="14" fill="#3CC8DB" opacity="0.7"/>
  <circle cx="196" cy="350" r="14" fill="#F5B731" opacity="0.8"/>
  <circle cx="320" cy="350" r="14" fill="#3CC8DB" opacity="0.7"/>
  <circle cx="400" cy="350" r="14" fill="#F5B731" opacity="0.8"/>

  <!-- Subtle "ghui" text in bottom area -->
  <text x="256" y="430" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif"
        font-size="36" font-weight="600" fill="#3CC8DB" opacity="0.4" letter-spacing="4">ghui</text>
</svg>
