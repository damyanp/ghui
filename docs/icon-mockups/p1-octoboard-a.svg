<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Proposal 1A: "The Octoboard" - Rounded card with connected nodes forming a "G" shape -->

  <!-- Card background -->
  <rect x="48" y="48" width="416" height="416" rx="56" ry="56" fill="#1A1A2E"/>

  <!-- Subtle grid lines suggesting a kanban board -->
  <line x1="200" y1="80" x2="200" y2="432" stroke="#3CC8DB" stroke-width="1.5" opacity="0.12"/>
  <line x1="350" y1="80" x2="350" y2="432" stroke="#3CC8DB" stroke-width="1.5" opacity="0.12"/>

  <!-- "G" shape formed from connected nodes -->
  <!-- The G path: top-right, top-left, left, bottom-left, bottom-right, middle-right -->

  <!-- Connection lines (drawn first, behind nodes) -->
  <!-- Top arc: top-right to top-left -->
  <path d="M 340 140 C 280 100, 180 100, 140 160"
        stroke="#3CC8DB" stroke-width="6" fill="none" stroke-linecap="round" opacity="0.6"/>
  <!-- Left side: top-left to bottom-left -->
  <path d="M 140 160 C 110 220, 110 300, 140 360"
        stroke="#3CC8DB" stroke-width="6" fill="none" stroke-linecap="round" opacity="0.6"/>
  <!-- Bottom: bottom-left to bottom-right -->
  <path d="M 140 360 C 200 400, 300 400, 360 340"
        stroke="#3CC8DB" stroke-width="6" fill="none" stroke-linecap="round" opacity="0.6"/>
  <!-- Right: bottom-right to middle-right -->
  <path d="M 360 340 L 360 260"
        stroke="#F5B731" stroke-width="6" fill="none" stroke-linecap="round" opacity="0.8"/>
  <!-- Middle bar of G: middle-right to center -->
  <path d="M 360 260 L 260 260"
        stroke="#F5B731" stroke-width="6" fill="none" stroke-linecap="round" opacity="0.8"/>

  <!-- Nodes along the G shape -->
  <circle cx="340" cy="140" r="20" fill="#3CC8DB" opacity="0.7"/>
  <circle cx="140" cy="160" r="20" fill="#3CC8DB"/>
  <circle cx="140" cy="360" r="20" fill="#3CC8DB"/>
  <circle cx="360" cy="340" r="20" fill="#3CC8DB"/>
  <circle cx="360" cy="260" r="20" fill="#F5B731"/>
  <circle cx="260" cy="260" r="24" fill="#F5B731"/>

  <!-- Center hub node - the focal point -->
  <circle cx="260" cy="260" r="12" fill="#1A1A2E"/>
</svg>
