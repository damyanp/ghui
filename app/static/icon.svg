<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Variant H: Ultra-bold, maximum simplification — 4 thick rows, clear chevrons, strong at all sizes -->

  <!-- Background rounded square -->
  <rect x="40" y="40" width="432" height="432" rx="56" ry="56" fill="#1A1A2E"/>

  <!-- === 4 Bold Tree Rows === -->

  <!-- Row 1: Root — expanded chevron ▼ (golden) -->
  <polygon points="80,132 112,132 96,156" fill="#F5B731"/>
  <rect x="128" y="120" width="300" height="48" rx="14" fill="#F5B731" opacity="0.35"/>
  <!-- Inner highlight bar (title) -->
  <rect x="140" y="132" width="160" height="24" rx="8" fill="#F5B731" opacity="0.5"/>

  <!-- Row 2: Child — expanded chevron ▼ (cyan), indented -->
  <polygon points="128,222 160,222 144,246" fill="#3CC8DB"/>
  <rect x="176" y="210" width="252" height="48" rx="14" fill="#3CC8DB" opacity="0.25"/>
  <rect x="188" y="222" width="120" height="24" rx="8" fill="#3CC8DB" opacity="0.45"/>

  <!-- Row 3: Grandchild — leaf (no chevron), indented 2 -->
  <rect x="224" y="296" width="204" height="40" rx="12" fill="#3CC8DB" opacity="0.18"/>
  <rect x="236" y="306" width="80" height="20" rx="6" fill="#3CC8DB" opacity="0.4"/>

  <!-- Row 4: Child — collapsed chevron ▶ (cyan), indented -->
  <polygon points="128,394 152,412 128,430" fill="#3CC8DB"/>
  <rect x="176" y="396" width="252" height="48" rx="14" fill="#3CC8DB" opacity="0.25"/>
  <rect x="188" y="408" width="140" height="24" rx="8" fill="#3CC8DB" opacity="0.45"/>
</svg>
